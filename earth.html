<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Circle Map - Standard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif !important;
            background-color: #f0f0f0;
            color: #333;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #map { flex: 1; background: #aad3df; } /* 海の色に近い背景 */
        .controls {
            padding: 12px 20px;
            background: #ffffff;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 13px;
            font-weight: bold;
            border-bottom: 2px solid #ddd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .line-red { width: 20px; height: 3px; background: #ff0033; border-radius: 2px; }
        .line-blue { width: 20px; height: 3px; background: #0055ff; border-radius: 2px; }
        button {
            background: #ff0033; color: white; border: none; padding: 8px 16px;
            border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #cc0029; transform: scale(1.05); }
        #distance-info { margin-left: auto; color: #555; font-family: monospace; }
    </style>
</head>
<body>

    <div class="controls">
        <div style="display:flex; align-items:center; gap:8px;"><div class="line-red"></div> メルカトル直線</div>
        <div style="display:flex; align-items:center; gap:8px;"><div class="line-blue"></div> 球体最短距離</div>
        <button onclick="clearMap()">RESET</button>
        <div id="distance-info">CLICK 2 POINTS</div>
    </div>

    <div id="map"></div>

    <script>
        const map = L.map('map', {
            center: [30, 0],
            zoom: 2,
            minZoom: 2,
            maxBounds: [[-85, -180], [85, 180]], 
            maxBoundsViscosity: 1.0,
            noWrap: true
        });

        // 標準的な地図タイル (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            noWrap: true,
            bounds: [[-85, -180], [85, 180]]
        }).addTo(map);

        let markers = [];
        let layers = [];

        map.on('click', function(e) {
            if (markers.length >= 2) clearMap();

            const wrappedLatLng = e.latlng.wrap();

            const marker = L.circleMarker(wrappedLatLng, {
                radius: 7, fillColor: "#fff", color: "#ff0033", weight: 3, fillOpacity: 1
            }).addTo(map);
            markers.push(marker);

            if (markers.length === 2) drawPaths();
        });

        function drawPaths() {
            const start = markers[0].getLatLng();
            const end = markers[1].getLatLng();

            // 1. 直線 (Rhumb Line) - 赤
            const rhumbLine = L.polyline([start, end], {
                color: '#ff0033', weight: 3, dashArray: '8, 8'
            }).addTo(map);
            layers.push(rhumbLine);

            // 2. 最短距離 (Great Circle) - 青（標準地図で見やすい色に変更）
            const startPt = turf.point([start.lng, start.lat]);
            const endPt = turf.point([end.lng, end.lat]);
            
            const arc = turf.greatCircle(startPt, endPt, { npoints: 100 });
            
            const greatCircle = L.geoJSON(arc, {
                style: { color: '#0055ff', weight: 4, opacity: 0.8 }
            }).addTo(map);
            layers.push(greatCircle);

            const dist = turf.distance(startPt, endPt, { units: 'kilometers' });
            document.getElementById('distance-info').innerText = `DIST: ${Math.round(dist).toLocaleString()} km`;
        }

        function clearMap() {
            markers.forEach(m => map.removeLayer(m));
            layers.forEach(l => map.removeLayer(l));
            markers = [];
            layers = [];
            document.getElementById('distance-info').innerText = "CLICK 2 POINTS";
        }
    </script>
</body>
</html>
